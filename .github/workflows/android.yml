name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r25c
        run: sdkmanager "ndk;25.2.9519653"

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: /usr/share/haxe/lib
          key: haxelib-${{ runner.os }}-${{ hashFiles('project.xml') }}
          restore-keys: haxelib-${{ runner.os }}-

      - name: Install hmm
        run: haxelib install hmm --quiet

      - name: Install haxelibs via hmm
        run: haxelib run hmm install

      - name: Configure lime Android paths
        run: |
          haxelib run lime config ANDROID_SDK    $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME      $JAVA_HOME
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Build (release)
        run: haxelib run lime build android -release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TADC-Fangame-Android
          path: export/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

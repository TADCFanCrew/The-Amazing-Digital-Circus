name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r21e + required SDK components
        run: |
          echo "y" | sdkmanager \
            "ndk;21.4.7075529" \
            "platforms;android-34" \
            "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: /usr/share/haxe/lib
          key: haxelib-${{ runner.os }}-${{ hashFiles('project.xml') }}
          restore-keys: haxelib-${{ runner.os }}-

      - name: Install hmm
        run: haxelib install hmm --quiet

      - name: Install haxelibs via hmm
        run: haxelib run hmm install --quiet

      - name: Force hxcpp 4.3.2
        run: |
          haxelib install hxcpp 4.3.2 --quiet
          haxelib set hxcpp 4.3.2

      - name: Setup lime for Android
        run: printf '%s\n' "$ANDROID_SDK_ROOT" "$ANDROID_NDK_HOME" "$JAVA_HOME" | haxelib run lime setup android

      - name: Build (release)
        run: haxelib run lime build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TADC-Fangame-Android
          path: export/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30